name: Windows Build

on:
  push:
    branches:
      - main # أو master حسب اسم الفرع الأساسي عندك

jobs:
  build:
    name: Build Flutter Windows
    runs-on: windows-latest

    # تحديد مسار المشروع الأساسي
    defaults:
      run:
        working-directory: clinic_management_system_v2/clinic_app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      # مسح أي مجلد ويندوز قديم ومضروب لتجنب التعارض
      - name: Remove Corrupted Windows Folder
        run: if (Test-Path windows) { Remove-Item -Recurse -Force windows }
        shell: powershell

      # إنشاء مجلد ويندوز جديد ونظيف
      - name: Create Windows Project
        run: flutter create --platforms=windows .
        
      # تنظيف الكاش الخاص بالمشروع
      - name: Clean Project
        run: flutter clean

      # جلب المكاتب (الآن سيتم ربطها بنجاح مع مجلد الويندوز)
      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows App
        run: flutter build windows --release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-release
          path: clinic_management_system_v2/clinic_app/build/windows/x64/runner/Release/
          
